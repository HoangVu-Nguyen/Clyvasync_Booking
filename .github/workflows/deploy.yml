name: Angular Docker Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/angular-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/angular-app:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Tải bản mới nhất và chạy container
            docker pull ${{ secrets.DOCKER_USERNAME }}/angular-app:latest
            docker stop angular-container || true
            docker rm angular-container || true
            docker run -d --name angular-container -p 80:80 ${{ secrets.DOCKER_USERNAME }}/angular-app:latest