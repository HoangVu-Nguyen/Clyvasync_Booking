<div class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-x-hidden relative">
  <nav class="flex justify-between items-center px-8 py-6 w-full absolute top-0 z-50 bg-transparent text-[#2D4739]">
    <div class="font-headline font-bold tracking-tighter text-2xl">
      The Curator
    </div>
    <div class="flex items-center gap-6">
      <button class="material-symbols-outlined hover:opacity-70 transition-opacity scale-95 duration-300">info</button>
    </div>
  </nav>

  <main class="flex-grow flex items-center justify-center relative p-4 md:p-8 lg:p-12">
    <div class="absolute inset-0 z-0">
      <img class="w-full h-full object-cover grayscale-[0.2] brightness-75" 
           src="https://images.unsplash.com/photo-1494412519320-aa613dfb7738?auto=format&fit=crop&q=80" 
           alt="Cinematic Architecture">
      <div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent"></div>
    </div>

    <div class="relative z-10 w-full max-w-lg glass-effect p-12 rounded-xl flex flex-col items-center text-center shadow-[0px_24px_48px_rgba(28,28,25,0.06)] border border-white/20">
      <div class="mb-8 w-16 h-16 rounded-full bg-primary-container flex items-center justify-center">
        <span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">architecture</span>
      </div>

      <h1 class="font-headline font-bold text-4xl lg:text-5xl text-primary tracking-tight mb-4">
        Welcome to the Sanctuary
      </h1>
      <p class="font-body text-on-surface-variant text-lg max-w-xs mb-12">
        Curated architectural wonders for the modern wanderer.
      </p>

      <button (click)="redirectToOAuth()" 
              class="group relative w-full flex items-center justify-center gap-3 bg-gradient-to-r from-primary to-primary-container text-on-primary py-5 px-8 rounded-full font-headline font-semibold text-lg transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-primary/20">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shield_person</span>
        Connect via OAuth2
        <span class="material-symbols-outlined transition-transform duration-300 group-hover:translate-x-1">arrow_forward</span>
      </button>

      <div class="mt-12 flex flex-col gap-4">
        <p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-semibold">
          Encrypted Authentication Protocol
        </p>
        <div class="flex gap-4 items-center justify-center opacity-40">
          <span class="h-[1px] w-8 bg-on-surface-variant"></span>
          <span class="material-symbols-outlined text-sm">lock</span>
          <span class="h-[1px] w-8 bg-on-surface-variant"></span>
        </div>
      </div>
    </div>
  </main>

  <app-footer></app-footer>
</div>
