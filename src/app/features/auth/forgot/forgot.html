<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- 8-Bit Environmental Background Decorations -->
<div class="absolute inset-0 z-0 pointer-events-none hills-bg">
<!-- Clouds -->
<div class="absolute top-20 left-10 w-24 h-8 bg-surface-container-lowest opacity-80" style="box-shadow: 8px 8px 0 0 #fff, 16px 16px 0 0 #fff, -8px 8px 0 0 #fff;"></div>
<div class="absolute top-40 right-20 w-32 h-10 bg-surface-container-lowest opacity-60" style="box-shadow: 8px 8px 0 0 #fff, 16px 16px 0 0 #fff, -8px 8px 0 0 #fff;"></div>
<!-- Distant Hills -->
<div class="absolute bottom-32 left-0 right-0 flex items-end justify-around opacity-40">
<div class="w-64 h-48 bg-outline-variant" style="clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></div>
<div class="w-80 h-64 bg-outline" style="clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></div>
<div class="w-48 h-32 bg-outline-variant" style="clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></div>
</div>
<!-- Green Grid Floor -->
<div class="absolute bottom-0 w-full h-32 bg-surface-container-low border-t-4 border-on-surface retro-grid"></div>
</div>
<!-- Main Recovery Shell -->
<main class="relative z-10 w-full max-w-lg px-6">
<!-- Warp-Zone Container -->
<div class="bg-surface-container-lowest pixel-border p-8 md:p-12 shadow-[12px_12px_0_0_rgba(0,55,8,0.1)]">
<!-- Branding / Nav Context (Suppressed Shell as per Task logic for Focused Journey) -->
<div class="flex flex-col items-center mb-10">
<div class="mb-6 flex space-x-2">
<span class="w-4 h-4 bg-primary"></span>
<span class="w-4 h-4 bg-tertiary-container"></span>
<span class="w-4 h-4 bg-secondary"></span>
</div>
<h1 class="font-headline font-black text-4xl text-primary uppercase tracking-tighter text-center leading-none">
                    RECOVER YOUR LIFE
                </h1>
<p class="font-label text-sm text-outline mt-4 font-bold tracking-widest text-center">
                    LOST YOUR SECRET KEY? ENTER YOUR IDENTITY BELOW.
                </p>
</div>
<!-- Recovery Form -->
<form class="space-y-8">
<div class="space-y-3">
<label class="block font-label text-xs font-black text-on-surface-variant tracking-widest uppercase">
                        PLAYER EMAIL
                    </label>
<div class="relative group">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-outline">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">alternate_email</span>
</div>
<input class="w-full bg-surface border-2 border-outline-variant/20 px-12 py-4 font-body text-on-surface placeholder:text-outline/40 focus:ring-0 focus:border-secondary transition-colors duration-0" placeholder="username@clyvasync.net" type="email"/>
</div>
</div>
<!-- Action Block -->
<div class="space-y-4">
<button class="w-full bg-primary text-on-primary font-headline font-black py-5 text-xl uppercase flex items-center justify-center space-x-4 step-animation shadow-[0_6px_0_0_#4f0002] active:shadow-none active:translate-y-[6px]" type="submit">
<span class="flex items-center justify-center w-8 h-8 bg-on-primary text-primary text-xs font-black rounded-sm">A</span>
<span>SEND RECOVERY CODE</span>
</button>
<div class="flex justify-center pt-4">
<a class="group flex items-center space-x-2 font-label text-xs font-black text-outline hover:text-primary transition-colors uppercase tracking-widest" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
<span class="border-b-2 border-transparent group-hover:border-primary">Warp back to Login</span>
</a>
</div>
</div>
</form>
</div>
<!-- System Status Bar (Mimicking HUD) -->
<div class="mt-8 flex justify-between items-center px-4 font-label text-[10px] font-black text-on-surface-variant uppercase tracking-[0.2em]">
<div class="flex items-center space-x-4">
<span class="flex items-center"><span class="material-symbols-outlined text-xs mr-1" style="font-variation-settings: 'FILL' 1;">favorite</span> HP: 1/100</span>
<span class="flex items-center"><span class="material-symbols-outlined text-xs mr-1">shield</span> DEF: 99</span>
</div>
<div class="flex items-center">
<span>RECOVERY MODE: ACTIVE</span>
</div>
</div>
</main>
<!-- Side Decoration (Hidden on small screens) -->
<aside class="hidden xl:block absolute right-12 top-1/2 -translate-y-1/2 z-20">
<div class="space-y-4">
<div class="w-16 h-16 bg-tertiary-container shadow-[4px_4px_0_0_#584800] flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-container" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="w-16 h-16 bg-surface-container-highest shadow-[4px_4px_0_0_#003708] flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
</div>
</aside>
<!-- Bottom Nav Suppressed as per context: Focus Journey / Transactional Screen -->
</body>
