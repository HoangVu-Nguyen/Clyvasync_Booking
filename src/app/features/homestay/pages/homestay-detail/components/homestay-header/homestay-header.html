<header class="pt-32 pb-8 border-b border-outline-variant/20 mb-12">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-8">
        <div class="flex-1">
            <!-- Breadcrumb & Rating Row -->
            <div class="flex flex-wrap items-center gap-3 mb-6">
                <span class="inline-flex items-center bg-primary/5 text-primary border border-primary/10 px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-[0.15em]">
                    <span class="material-symbols-outlined text-[14px] mr-1.5" style="font-variation-settings: 'FILL' 1;">explore</span>
                    REYKJAVIK
                </span>
                
                <div class="h-4 w-[1px] bg-outline-variant/30 hidden md:block"></div>
                
                <div class="flex items-center gap-1.5 bg-surface-container-low px-3 py-1.5 rounded-lg shadow-sm border border-outline-variant/10">
                    <span class="material-symbols-outlined text-[18px] text-secondary" style="font-variation-settings: 'FILL' 1;">star</span>
                    <span class="text-sm font-bold text-on-surface">4.95</span>
                    <span class="text-on-surface-variant text-[13px] font-medium ml-1">· 128 reviews</span>
                </div>
            </div>

            <!-- Main Title -->
            <h1 class="text-5xl md:text-7xl font-headline font-black tracking-tight text-primary leading-[1.05] drop-shadow-sm">
                The Obsidian Monolith
            </h1>

            <!-- Location & Action Row -->
            <div class="mt-6 flex flex-wrap items-center gap-6">
                <p class="flex items-center gap-2 text-on-surface-variant font-medium hover:text-primary transition-colors cursor-pointer group">
                    <span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">location_on</span>
                    <span class="border-b border-transparent group-hover:border-primary/30 pb-0.5">42 Lava Field Road, Reykjavik, Iceland</span>
                </p>
                
                <div class="flex items-center gap-4">
                    <button class="flex items-center gap-2 text-sm font-bold text-primary hover:bg-primary/5 px-3 py-2 rounded-lg transition-all">
                        <span class="material-symbols-outlined text-[20px]">share</span>
                        Share
                    </button>
                    <button class="flex items-center gap-2 text-sm font-bold text-primary hover:bg-primary/5 px-3 py-2 rounded-lg transition-all">
                        <span class="material-symbols-outlined text-[20px]">favorite</span>
                        Save
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>
