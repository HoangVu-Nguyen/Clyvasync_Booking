<section class="mb-24 px-4 md:px-0">
    <!-- Airy Luxury Accordion Gallery -->
    <div class="flex flex-col md:flex-row w-full h-[600px] lg:h-[700px] gap-3 md:gap-4 overflow-hidden group/gallery">
        
        <!-- CARD 1: EXTERIOR -->
        <div class="relative flex-1 md:flex-[4] md:group-hover/gallery:flex-1 md:hover:!flex-[5] transition-all duration-[1.2s] ease-[cubic-bezier(0.25,1,0.1,1)] rounded-[2rem] overflow-hidden cursor-pointer group/card shadow-lg hover:shadow-2xl">
            <img [src]="galleryImages().exterior" alt="Exterior" 
                class="absolute inset-0 w-full h-full object-cover transition-all duration-[1.5s] scale-110 group-hover/card:scale-100 brightness-100 md:group-hover/gallery:brightness-50 md:hover:!brightness-100" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent opacity-80 group-hover/card:opacity-100 transition-opacity duration-1000"></div>
            
            <!-- Labels & Content -->
            <div class="absolute bottom-8 left-8 right-8 transition-all duration-700 opacity-100 md:group-hover/gallery:opacity-0 md:hover:!opacity-100 z-10">
                <h2 class="text-white text-4xl font-light tracking-wide mb-8 leading-[1.1]">
                    The <span class="font-black font-headline">Architecture</span>
                </h2>
            </div>
        </div>

        <!-- CARD 2: INTERIOR -->
        <div class="relative flex-1 md:hover:!flex-[5] transition-all duration-[1.2s] ease-[cubic-bezier(0.25,1,0.1,1)] rounded-[2rem] overflow-hidden cursor-pointer group/card shadow-lg hover:shadow-2xl">
            <img [src]="galleryImages().interior" alt="Interior" 
                class="absolute inset-0 w-full h-full object-cover transition-all duration-[1.5s] scale-110 group-hover/card:scale-100 brightness-50 group-hover/card:brightness-100" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent opacity-80 group-hover/card:opacity-100 transition-opacity duration-1000"></div>
            
            <div class="absolute bottom-8 left-8 opacity-0 group-hover/card:opacity-100 z-10">
                <h2 class="text-white text-4xl font-light tracking-wide leading-[1.1]">
                    Minimalist <span class="font-black font-headline">Living</span>
                </h2>
            </div>
        </div>

        <!-- CARD 3: WELLNESS -->
        <div class="relative flex-1 md:hover:!flex-[5] transition-all duration-[1.2s] ease-[cubic-bezier(0.25,1,0.1,1)] rounded-[2rem] overflow-hidden cursor-pointer group/card shadow-lg hover:shadow-2xl">
            <img [src]="galleryImages().wellness" alt="Sauna" 
                class="absolute inset-0 w-full h-full object-cover transition-all duration-[1.5s] scale-110 group-hover/card:scale-100 brightness-50 group-hover/card:brightness-100" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent opacity-80 group-hover/card:opacity-100 transition-opacity duration-1000"></div>
            
            <div class="absolute bottom-8 left-8 opacity-0 group-hover/card:opacity-100 z-10">
                <h2 class="text-white text-4xl font-light tracking-wide leading-[1.1]">
                    Volcanic <span class="font-black font-headline">Relax</span>
                </h2>
            </div>
        </div>

        <!-- CARD 4: GALLERY CTA -->
        <div class="relative flex-1 md:hover:!flex-[5] transition-all duration-[1.2s] ease-[cubic-bezier(0.25,1,0.1,1)] rounded-[2rem] overflow-hidden cursor-pointer group/card shadow-lg hover:shadow-2xl">
            <img [src]="galleryImages().atmosphere" alt="Atmosphere" 
                class="absolute inset-0 w-full h-full object-cover transition-all duration-[2s] scale-125 group-hover/card:scale-100 brightness-75 group-hover/card:brightness-100" />
            <div class="absolute inset-0 bg-gradient-to-t from-[#173124]/60 via-black/20 to-transparent opacity-60 group-hover/card:opacity-100 transition-opacity duration-1000"></div>

            <div class="absolute inset-0 flex flex-col items-center justify-center opacity-100 group-hover/card:opacity-100 z-10">
                <span class="material-symbols-outlined text-white text-[48px] mb-4">grid_view</span>
                <span class="text-white font-bold text-lg uppercase tracking-widest">{{ galleryImages().totalCount }} Photos</span>
            </div>
        </div>

    </div>
</section>
