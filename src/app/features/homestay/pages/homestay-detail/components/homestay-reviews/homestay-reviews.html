
<div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
    <div>
      <h3 class="text-3xl font-headline font-bold text-primary tracking-tight">Guest Experiences</h3>
      <p class="text-on-surface-variant mt-2 font-medium">Real stories from our global community.</p>
    </div>
    
    <div class="flex items-center gap-5 bg-white px-6 py-3 rounded-2xl border border-outline-variant/20 shadow-sm">
      <div class="flex items-center text-primary gap-1 pr-5 border-r border-outline-variant/30">
        <span class="text-2xl font-black">{{ averageRating() | number:'1.1-1' }}</span>
        <span class="material-symbols-outlined text-amber-500 text-[18px]" style="font-variation-settings: 'FILL' 1;">star</span>
      </div>
      <div class="flex flex-col">
        <p class="text-lg font-bold text-primary leading-none">{{ totalCount() }}</p>
        <p class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mt-0.5">Reviews</p>
      </div>
    </div>
  </div>
<!-- Grid Container -->
<!-- Grid: Đổi auto-rows thành min-height vừa phải (khoảng 320px) -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 auto-rows-[minmax(320px,auto)]">
  @for (item of reviews(); track item.id; let i = $index) {
    <app-homestay-review-item 
      [review]="item" 
      [index]="i"
      [class]="(i % 4 === 0 || i % 4 === 3) ? 'md:col-span-2' : 'col-span-1'">
    </app-homestay-review-item>
  }
</div>

<!-- Nút Load More: Kiểu Editorial Button -->
<div class="mt-24 flex flex-col items-center gap-6" *ngIf="!isLastPage()">
    <div class="w-px h-16 bg-gradient-to-b from-stone-200 to-transparent"></div>
    
    <button (click)="loadMore()" 
            [disabled]="isLoading()"
            class="group relative overflow-hidden bg-primary text-white px-12 py-5 rounded-full font-bold text-[11px] uppercase tracking-[0.3em] transition-all hover:bg-stone-900 active:scale-95 disabled:opacity-50">
        <span class="relative z-10 flex items-center gap-4">
            <span *ngIf="!isLoading()">Explore More Stories</span>
            <span *ngIf="isLoading()" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
            <span class="material-symbols-outlined text-[16px] group-hover:translate-y-1 transition-transform">south</span>
        </span>
    </button>
    
    <p class="text-[9px] font-black text-stone-400 uppercase tracking-[0.4em]">
        {{ reviews().length }} of {{ totalCount() }} Experiences
    </p>
</div>
