<div class="sticky top-32 p-8 bg-white/90 backdrop-blur-3xl rounded-[2.5rem] shadow-[0_24px_48px_-12px_rgba(0,0,0,0.1)] border border-white">
    
    <!-- Giá và Huy hiệu -->
    <div class="flex justify-between items-start mb-8">
        <div>
            <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-[0.2em] mb-1.5 flex items-center gap-1">
                <span class="relative flex h-1.5 w-1.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-emerald-500"></span>
                </span>
                Available to book
            </p>
            <h4 class="text-4xl lg:text-5xl font-black text-primary tracking-tighter">
                $1,250 <span class="text-base font-medium text-on-surface-variant tracking-normal">/night</span>
            </h4>
        </div>
        <div class="bg-secondary/10 text-secondary p-2.5 rounded-2xl flex items-center justify-center">
            <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">verified</span>
        </div>
    </div>

    <!-- Form Đặt phòng (Các khối tách rời được tinh chỉnh độ tương phản) -->
    <div class="space-y-3 mb-6">
        <!-- Hàng 1: Check-in / Check-out -->
        <div class="grid grid-cols-2 gap-3">
            <!-- Thêm thẻ button thay cho div để có tính tương tác thật (Clickable) -->
            <button type="button" class="group relative bg-white border border-outline-variant/30 p-4 rounded-[1.5rem] text-left transition-all hover:border-primary/40 hover:shadow-md focus:border-primary focus:ring-1 focus:ring-primary/20">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-[20px] text-on-surface-variant group-hover:text-primary transition-colors">calendar_today</span>
                    <div class="flex flex-col">
                        <!-- Giảm font-black xuống font-bold cho label để bớt gắt -->
                        <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-0.5 group-hover:text-primary transition-colors">Check-in</span>
                        <span class="text-sm font-bold text-primary">Nov 24, 2024</span>
                    </div>
                </div>
            </button>

            <button type="button" class="group relative bg-white border border-outline-variant/30 p-4 rounded-[1.5rem] text-left transition-all hover:border-primary/40 hover:shadow-md focus:border-primary focus:ring-1 focus:ring-primary/20">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-[20px] text-on-surface-variant group-hover:text-primary transition-colors">event_upcoming</span>
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-0.5 group-hover:text-primary transition-colors">Check-out</span>
                        <span class="text-sm font-bold text-primary">Nov 29, 2024</span>
                    </div>
                </div>
            </button>
        </div>
        
        <!-- Hàng 2: Guests -->
        <button type="button" class="group relative w-full bg-white border border-outline-variant/30 p-4 rounded-[1.5rem] text-left flex items-center justify-between transition-all hover:border-primary/40 hover:shadow-md focus:border-primary focus:ring-1 focus:ring-primary/20">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-[20px] text-on-surface-variant group-hover:text-primary transition-colors">group</span>
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-0.5 group-hover:text-primary transition-colors">Guests</span>
                    <span class="text-sm font-bold text-primary">2 Guests, 1 Infant</span>
                </div>
            </div>
            <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-transform group-hover:translate-y-0.5">expand_more</span>
        </button>
    </div>

    <!-- Tích hợp Promo Code mượt mà vào cấu trúc tách khối -->
    <div class="mb-8 group">
        <div class="flex items-center gap-2 bg-surface-container-lowest border border-outline-variant/20 rounded-2xl p-1.5 transition-all focus-within:border-primary/50 focus-within:bg-white focus-within:shadow-sm">
            <span class="material-symbols-outlined text-on-surface-variant pl-3 text-[20px]">sell</span>
            <input type="text" placeholder="Got a promo code?" class="bg-transparent border-none focus:ring-0 text-sm font-bold w-full text-primary placeholder:text-outline-variant placeholder:font-medium outline-none px-2" />
            <button class="bg-primary text-white hover:bg-primary/90 px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest transition-all active:scale-95 shadow-sm">
                Apply
            </button>
        </div>
    </div>

    <!-- Chi tiết thanh toán -->
    <div class="space-y-4 mb-8 px-2">
        <div class="flex justify-between text-sm">
            <span class="text-on-surface-variant font-medium underline decoration-outline-variant/40 underline-offset-4 cursor-pointer hover:text-primary">$1,250 × 5 nights</span>
            <span class="text-primary font-bold">$6,250</span>
        </div>
        <div class="flex justify-between text-sm">
            <span class="text-on-surface-variant font-medium underline decoration-outline-variant/40 underline-offset-4 cursor-pointer hover:text-primary">Service fee</span>
            <span class="text-primary font-bold">$150</span>
        </div>
        
        <!-- Đường phân cách tinh tế hơn (nét đứt) -->
        <div class="border-t border-dashed border-outline-variant/40 my-6"></div>
        
        <div class="flex justify-between items-center">
            <span class="text-base font-bold text-primary">Total Amount</span>
            <span class="text-2xl font-black text-primary tracking-tighter">$6,400</span>
        </div>
    </div>

    <!-- Nút hành động chính -->
    <div class="relative group">
        <!-- Glow effect được làm mịn hơn -->
        <div class="absolute -inset-1.5 bg-gradient-to-r from-primary/60 to-primary-container/60 rounded-full blur-md opacity-0 group-hover:opacity-100 transition duration-500"></div>
        
        <button class="relative w-full py-5 rounded-full bg-primary text-white font-black text-sm tracking-[0.15em] uppercase shadow-lg hover:shadow-xl transition-all active:scale-[0.98] flex items-center justify-center gap-3">
            Confirm Booking
            <span class="material-symbols-outlined text-[20px] transform group-hover:translate-x-1 transition-transform">arrow_forward</span>
        </button>
    </div>

    <div class="flex items-center justify-center gap-2 mt-6">
        <span class="material-symbols-outlined text-[16px] text-emerald-600">verified_user</span>
        <p class="text-center text-on-surface-variant text-[11px] font-bold uppercase tracking-widest">
            Risk-free booking: No charges yet
        </p>
    </div>
</div>
