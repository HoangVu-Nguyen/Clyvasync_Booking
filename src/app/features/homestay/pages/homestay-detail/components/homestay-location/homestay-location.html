<section class="py-16 border-t border-outline-variant/15">
    <div class="mb-10">
        <h3 class="text-3xl font-headline font-bold text-primary tracking-tight">Location</h3>
        <p class="text-on-surface-variant mt-2 font-medium">Nestled in the heart of the {{ homestay()?.city }} wilderness.</p>
    </div>

    <div class="relative w-full h-[550px] md:h-[650px] rounded-[2rem] border border-outline-variant/20 overflow-hidden shadow-inner">
        
        <!-- ĐÂY LÀ NƠI BẢN ĐỒ HIỂN THỊ -->
        <div #mapContainer class="absolute inset-0 z-0"></div>
        
        <!-- Overlay mờ để các nút bấm nổi bật hơn -->
        <div class="absolute inset-0 pointer-events-none bg-gradient-to-t from-black/20 via-transparent to-transparent z-10"></div>

        <!-- THE FLOATING INFO CARD (Giữ nguyên giao diện đẹp của bạn) -->
        <div class="absolute bottom-4 left-4 right-4 md:bottom-8 md:left-8 md:right-auto md:w-[380px] bg-white/90 backdrop-blur-md p-6 rounded-[1.5rem] shadow-2xl border border-white/20 z-20 transition-all hover:-translate-y-1">
            <div class="mb-5">
                <p class="text-[10px] uppercase tracking-widest text-primary font-bold mb-1">Exact Location</p>
                <h4 class="font-headline font-bold text-xl text-primary leading-tight mb-2">{{ homestay()?.name }}</h4>
                <p class="text-sm text-on-surface-variant font-medium">{{ homestay()?.address }}, {{ homestay()?.city }}</p>
            </div>
            
            <div class="flex items-center gap-6 py-4 border-y border-outline-variant/10 mb-6">
                <div class="flex-1">
                    <p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold mb-1">Lat</p>
                    <p class="text-sm font-mono font-bold text-primary">{{ homestay()?.latitude }}</p>
                </div>
                <div class="flex-1 border-l border-outline-variant/10 pl-6">
                    <p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold mb-1">Long</p>
                    <p class="text-sm font-mono font-bold text-primary">{{ homestay()?.longitude }}</p>
                </div>
            </div>
            
            <button (click)="openDirections()" class="w-full bg-[#173124] text-white py-4 rounded-xl font-bold text-sm hover:bg-[#12261c] transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-[20px]">directions</span>
                Open in Google Maps
            </button>
        </div>
    </div>
</section>
