<section class="py-12 border-t border-outline-variant/15">
    <!-- Header của phần Location -->
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-10">
        <div>
            <h3 class="text-3xl font-headline font-bold text-primary tracking-tight">The Remote Location</h3>
            <p class="text-on-surface-variant mt-2 font-medium">Nestled in the heart of the volcanic wilderness.</p>
        </div>
        <button class="flex items-center gap-2 text-sm font-bold text-primary bg-primary/5 px-5 py-2.5 rounded-full hover:bg-primary hover:text-white transition-all">
            <span class="material-symbols-outlined text-[20px]">directions</span>
            Get Directions
        </button>
    </div>

    <!-- Map Container với thiết kế tối giản -->
    <div class="group relative w-full h-[500px] rounded-[2.5rem] overflow-hidden shadow-2xl border border-outline-variant/10 bg-surface-container-low">
        
        <!-- Ảnh Map với hiệu ứng Noir/Minimalist -->
        <img alt="Topographic map" 
            class="w-full h-full object-cover grayscale-[0.3] brightness-[0.95] contrast-[1.1] transition-transform duration-[3s] group-hover:scale-105"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAW8uNsDHRR6EpwaiA-XXyHkigVqemfI3Edd9nvWMln3LNdqQ6s17YdBdugCY79RLC0UQNKFWM7QdgjegzqXRF4soZ8n0_YC2J8-L3P1HsT16jQa1pOhR0OLBKZEVLodJsMAN2dCv_OLw6d-w7EXmWWuCOwbAtPrHdPfqWYXF5UBxn-O2-sZoC0LfiAoFV7sovhgcUBvWRXndpiaTEuDavD8enkUGgYXALlXi4UQDoPUsGPY_XTG0FktlEIuEIGQTIMIcDCelo5Vew" />
        
        <!-- Lớp phủ Gradient mờ -->
        <div class="absolute inset-0 bg-gradient-to-b from-black/5 via-transparent to-black/20"></div>

        <!-- Custom Marker nghệ thuật -->
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="relative">
                <!-- Hiệu ứng Sóng lan tỏa (Pulse) -->
                <div class="absolute -inset-8 bg-primary/30 rounded-full animate-ping opacity-40"></div>
                <div class="absolute -inset-4 bg-primary/20 rounded-full animate-pulse opacity-60"></div>
                
                <!-- Marker chính -->
                <div class="relative flex items-center gap-3 bg-primary text-on-primary pl-4 pr-6 py-3 rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-white/20 transform transition-transform group-hover:scale-110">
                    <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">location_on</span>
                    <div class="flex flex-col leading-tight">
                        <span class="text-[10px] uppercase tracking-widest opacity-80 font-bold">Your Sanctuary</span>
                        <span class="font-bold whitespace-nowrap">The Obsidian Monolith</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Thông tin tọa độ nhỏ ở góc (Chất Architect) -->
        <div class="absolute bottom-8 left-8 hidden md:block">
            <div class="bg-black/40 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10 text-white/70 text-[10px] font-mono tracking-tighter">
                LAT: 64.1265° N | LONG: 21.8174° W
            </div>
        </div>
    </div>
</section>
