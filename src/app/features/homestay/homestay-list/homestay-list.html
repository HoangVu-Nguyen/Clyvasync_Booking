<main class="pt-32 pb-24 max-w-screen-2xl mx-auto px-6 md:px-8">
  
  <div class="mb-16">
    <h1 class="text-6xl md:text-[5rem] font-bold tracking-tighter text-[#173124] leading-[0.9] mb-4 font-headline uppercase">
      Điểm đến tinh hoa
    </h1>
    <p class="text-stone-600 max-w-xl text-lg font-medium leading-relaxed font-body">
      Bộ sưu tập những không gian nghỉ dưỡng độc bản, nơi kiến trúc đỉnh cao giao thoa cùng chiều sâu cảm xúc. Dành riêng cho những hành trình trải nghiệm tinh tế.
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-12 gap-x-10 gap-y-24">
    <app-homestay-item
      *ngFor="let item of homestaysRespone; let i = index"
      [homestay]="item"
      [layoutType]="i % 5"
      [ngClass]="{
        'md:col-span-8': i % 5 === 0 || i % 5 === 3,
        'md:col-span-4': i % 5 === 1 || i % 5 === 2,
        'md:col-span-12 mt-8': i % 5 === 4,
        'mt-20 md:mt-0': i % 5 === 1 
      }">
    </app-homestay-item>
  </div>

</main>
