<!-- KHU VỰC NÚT AVATAR (RETRO STYLE) -->
<div class="relative">
  <!-- Avatar Click (Nút bấm kiểu máy Arcade) -->
  <div 
    (click)="toggleMenu()"
    class="w-12 h-12 bg-surface-container-highest border-4 border-black cursor-pointer overflow-hidden transition-transform duration-100 active:translate-y-1"
    [class.shadow-[4px_4px_0_0_rgba(0,0,0,1)]]="!isOpen"
    [class.translate-y-1]="isOpen"
    [class.shadow-none]="isOpen">
    <img alt="User avatar" class="w-full h-full object-cover  hover:grayscale-0 transition-all" [src]=userHeaderResponse.photoUrl/>
  </div>

  <!-- MENU DROPDOWN RETRO 8-BIT STYLE -->
  <div 
    class="absolute right-0 top-14 w-80 bg-[#fffcd5] dark:bg-[#202020] border-4 border-black shadow-[8px_8px_0_0_rgba(0,0,0,1)] py-3 px-2 z-[100] origin-top-right transition-all duration-100"
    [class.opacity-100]="isOpen"
    [class.scale-100]="isOpen"
    [class.visible]="isOpen"
    [class.opacity-0]="!isOpen"
    [class.scale-95]="!isOpen"
    [class.invisible]="!isOpen">
    
    <!-- Header Thông tin User (Hồ sơ người chơi) -->
    <div class="flex items-center gap-3 p-3 mb-2 border-2 border-transparent hover:border-black hover:bg-[#ffeb3b] dark:hover:bg-[#404040] cursor-pointer transition-none group">
      <div class="w-12 h-12 border-2 border-black overflow-hidden bg-white">
         <img alt="User avatar" class="w-full h-full object-cover" [src]=userHeaderResponse.photoUrl/>
      </div>
      <div>
        <h2 class="font-headline text-[12px] font-bold uppercase text-[#e52521] dark:text-[#ff6b6b] mb-1">{{userHeaderResponse.username}}</h2>
        <p class="font-body text-[10px] uppercase font-bold text-gray-600 dark:text-gray-300 group-hover:text-black">> VIEW PLAYER STATS</p>
      </div>
    </div>

    <!-- Đường kẻ phân cách (Nét đứt kiểu game) -->
    <div class="border-b-4 border-dashed border-black mx-2 my-2"></div>

    <!-- Danh sách các chức năng (Menu Items) -->
    <ul class="space-y-1 z-20">
      
      <!-- Cài đặt & Quyền riêng tư (Khối Xanh lá) -->
      <li>
        <a href="#" class="flex items-center justify-between p-2 border-2 border-transparent hover:border-black hover:bg-[#ffeb3b] dark:hover:bg-[#404040] text-black dark:text-white transition-none group">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-[#43b047] border-2 border-black flex items-center justify-center shadow-[2px_2px_0_0_rgba(0,0,0,1)] group-hover:shadow-none group-hover:translate-x-[2px] group-hover:translate-y-[2px] transition-all">
              <span class="material-symbols-outlined text-white text-sm">settings</span>
            </div>
            <span class="font-headline text-[10px] uppercase mt-1">Cài đặt hệ thống</span>
          </div>
          <span class="font-headline text-[10px] text-gray-400 group-hover:text-black">></span>
        </a>
      </li>

      <!-- Trợ giúp & hỗ trợ (Khối Vàng ?) -->
      <li>
        <a href="#" class="flex items-center justify-between p-2 border-2 border-transparent hover:border-black hover:bg-[#ffeb3b] dark:hover:bg-[#404040] text-black dark:text-white transition-none group">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-[#fbd000] border-2 border-black flex items-center justify-center shadow-[2px_2px_0_0_rgba(0,0,0,1)] group-hover:shadow-none group-hover:translate-x-[2px] group-hover:translate-y-[2px] transition-all">
              <span class="material-symbols-outlined text-black text-sm font-bold">help</span>
            </div>
            <span class="font-headline text-[10px] uppercase mt-1">Trợ giúp / Mẹo</span>
          </div>
          <span class="font-headline text-[10px] text-gray-400 group-hover:text-black">></span>
        </a>
      </li>

      <!-- Màn hình & trợ năng (Khối Xanh dương) -->
      <li>
        <a href="#" class="flex items-center justify-between p-2 border-2 border-transparent hover:border-black hover:bg-[#ffeb3b] dark:hover:bg-[#404040] text-black dark:text-white transition-none group">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-[#049cd8] border-2 border-black flex items-center justify-center shadow-[2px_2px_0_0_rgba(0,0,0,1)] group-hover:shadow-none group-hover:translate-x-[2px] group-hover:translate-y-[2px] transition-all">
              <span class="material-symbols-outlined text-white text-sm">dark_mode</span>
            </div>
            <span class="font-headline text-[10px] uppercase mt-1">Đồ họa & Hiển thị</span>
          </div>
          <span class="font-headline text-[10px] text-gray-400 group-hover:text-black">></span>
        </a>
      </li>

      <!-- Đăng xuất (Khối Đỏ) -->
      <li class="mt-2" (click)="logout()">
        <div  class="flex items-center gap-3 p-2 bg-white dark:bg-[#303030] border-2 border-black hover:bg-[#e52521] hover:text-white text-black dark:text-white transition-none group shadow-[4px_4px_0_0_rgba(0,0,0,1)] active:shadow-none active:translate-y-1 mx-1 mb-1">
          <div class="w-8 h-8 flex items-center justify-center">
            <span class="material-symbols-outlined text-xl">logout</span>
          </div>
          <span class="font-headline text-[10px] uppercase mt-1">Đăng xuất</span>
        </div>
      </li>

    </ul>
    
    <!-- Footer nhỏ -->
    <div class="px-3 pt-4 pb-1 text-[8px] text-gray-500 font-headline uppercase text-center">
      MarioNet © 2026<br>Press Start to Play
    </div>

  </div>
</div>
